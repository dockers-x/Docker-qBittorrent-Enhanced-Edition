name: Auto Upload files to release

on:
  workflow_dispatch:
  schedule:
    - cron: '20 21 * * *'

permissions:
  contents: write

jobs:
  buildx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 获得仓库中的ReleaseTag
      - name: Set Version
        id: set-version
        run: |
          VERSION=$(cat ReleaseTag | head -n1)
          if [ -z "${VERSION}" ]; then
            echo "::error::ReleaseTag is empty"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "ReleaseTag=${VERSION}"

      # 缓存release tag，用作与下一次执行任务时获取到到release tag做对比
      - name: Cache tag
        id: cache-tag
        uses: actions/cache@v4
        with:
          path: ./tag/
          key: ${{ runner.os }}-tag-${{ steps.set-version.outputs.version }}

      # 获取将latest release tag，未命中缓存则更新ReleaseTag
      - name: Get latest release tag
        id: get-release-tag
        if: steps.cache-tag.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./tag
          echo "${{ steps.set-version.outputs.version }}" > ./tag/tag-${{ steps.set-version.outputs.version }}
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: Download upstream release
        if: steps.get-release-tag.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p ./qbittorrent
          gh release download "release-${{ steps.set-version.outputs.version }}" \
            --repo c0re100/qBittorrent-Enhanced-Edition \
            --dir ./qbittorrent \
            --clobber

      - name: Sync upstream changelog
        if: steps.get-release-tag.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release view "release-${{ steps.set-version.outputs.version }}" \
            --repo c0re100/qBittorrent-Enhanced-Edition \
            --json body,url \
            --jq '"Upstream release: " + .url + "\n\n" + (.body // "")' > ./ReleaseNotes.md


      - name: Upload files to release
        if: steps.get-release-tag.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: qBittorrent Enhanced Edition v${{ steps.set-version.outputs.version }}
          tag_name: ${{ steps.set-version.outputs.version }}
          body_path: ./ReleaseNotes.md
          files: |
            ./qbittorrent/*
