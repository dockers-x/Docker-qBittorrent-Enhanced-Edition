name: Update ReleaseTag

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'
    
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      # 获取latest release tag，和仓库中LocalReleaseTag对比，之后输出tag给之后的步骤
      - name: Set Version
        id: set-version
        run: |
          set -euo pipefail

          TAG=$(python3 - <<'PY'
          import json
          import urllib.request

          url = "https://api.github.com/repos/c0re100/qBittorrent-Enhanced-Edition/tags"
          with urllib.request.urlopen(url, timeout=30) as response:
              tags = json.load(response)

          for tag in tags:
              name = tag.get("name", "")
              if name.startswith("release-"):
                  print(name.removeprefix("release-"))
                  break
          PY
          )

          if [ -z "${TAG}" ]; then
            echo "::error::Failed to fetch a valid upstream release tag"
            exit 1
          fi

          OnlineReleaseTag=${TAG}
          LocalReleaseTag=$(cat ReleaseTag | head -n1)

          echo "LocalReleaseTag=$(cat ReleaseTag | head -n1)"
          echo "OnlineReleaseTag=${TAG}"

          if [ "${LocalReleaseTag}" != "${OnlineReleaseTag}" ]
          then
             echo "version=${TAG}" >> "${GITHUB_OUTPUT}"
             echo "status=success" >> "${GITHUB_OUTPUT}"
          fi

      # 将latest release tag写入到./ReleaseTag
      - name: Update ReleaseTag
        if: steps.set-version.outputs.status == 'success'
        run: |
          echo "${{ steps.set-version.outputs.version }}" > ./ReleaseTag

      # push到GitHub的项目当中
      - name: Push
        if: steps.set-version.outputs.status == 'success'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -am "Update ReleaseTag ${{ steps.set-version.outputs.version }}"
          git push -v --progress
